name: LuaFan CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-alpine:
    runs-on: ubuntu-22.04
    container:
      image: alpine:3.16.9

    steps:
    - name: Install git
      run: apk add --update git

    - name: Checkout code
      uses: actions/checkout@v6

    - name: Build LuaFan (Alpine)
      run: |
        cd $GITHUB_WORKSPACE
        sh build_docker_alpine.sh || exit -1

    - name: Build completion
      run: echo "Build Alpine finished!"

  build-ubuntu:
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:22.04

    steps:
    - name: Install git
      run: apt update && apt install -y git

    - name: Checkout code
      uses: actions/checkout@v6

    - name: Build LuaFan (Ubuntu)
      run: |
        cd $GITHUB_WORKSPACE
        bash build_docker_ubuntu.sh || exit -1

    - name: Build completion
      run: echo "Build Ubuntu finished!"

  build-macos-arm64:
    runs-on: macos-14

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        brew install cmake libevent openssl lua@5.4 curl mariadb-connector-c

    - name: Build LuaFan (macOS arm64)
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="$(brew --prefix);$(brew --prefix openssl);$(brew --prefix libevent);$(brew --prefix mariadb-connector-c);$(brew --prefix lua@5.4)" \
          -DCMAKE_FIND_FRAMEWORK=NEVER
        make -j$(sysctl -n hw.ncpu)

    - name: Build completion
      run: echo "Build macOS arm64 finished!"

  build-macos-x86_64:
    runs-on: macos-13

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        brew install cmake libevent openssl lua@5.4 curl mariadb-connector-c

    - name: Build LuaFan (macOS x86_64)
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="$(brew --prefix);$(brew --prefix openssl);$(brew --prefix libevent);$(brew --prefix mariadb-connector-c);$(brew --prefix lua@5.4)" \
          -DCMAKE_FIND_FRAMEWORK=NEVER
        make -j$(sysctl -n hw.ncpu)

    - name: Build completion
      run: echo "Build macOS x86_64 finished!"

  # Additional job for running tests using our comprehensive test suite
  test-comprehensive:
    runs-on: ubuntu-22.04
    needs: [build-ubuntu]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install test dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake pkg-config \
          liblua5.3-dev libssl-dev libcurl4-openssl-dev \
          libevent-dev lua5.3 bison libncurses5-dev \
          luarocks zlib1g-dev libsqlite3-dev
        sudo luarocks install lzlib
        sudo luarocks install lua-cjson 2.1.0-1
        sudo luarocks install lsqlite3

    - name: Build MariaDB from source
      run: |
        MARIADB_VERSION=5.5.68
        wget https://github.com/MariaDB/server/archive/mariadb-$MARIADB_VERSION.tar.gz
        tar xzf mariadb-$MARIADB_VERSION.tar.gz
        cd server-mariadb-$MARIADB_VERSION
        cmake . -DDISABLE_LIBMYSQLCLIENT_SYMBOL_VERSIONING=TRUE
        cd libmysql && sudo make -j$(nproc) install
        cd ../include && sudo make install
        cd ../..
        sudo rm -rf mariadb-$MARIADB_VERSION.tar.gz server-mariadb-$MARIADB_VERSION

    - name: Build for testing
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Debug
        make -j$(nproc)

    - name: Run comprehensive tests
      run: |
        cd tests
        chmod +x run_all_tests.sh
        ./run_all_tests.sh --verbose
