name: Docker Push

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Which image to build and push'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - ubuntu
          - alpine

jobs:
  push-ubuntu:
    runs-on: ubuntu-22.04
    if: inputs.target == 'both' || inputs.target == 'ubuntu'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Ubuntu image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.ubuntu
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          luafan/luafan-ubuntu:latest
          luafan/luafan-ubuntu:${{ github.sha }}

  push-alpine:
    runs-on: ubuntu-22.04
    if: inputs.target == 'both' || inputs.target == 'alpine'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Alpine image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.alpine
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          luafan/luafan-alpine:latest
          luafan/luafan-alpine:${{ github.sha }}
