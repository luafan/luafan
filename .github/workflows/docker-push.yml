name: Docker Push

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      target:
        description: 'Which image to build and push'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - ubuntu
          - alpine

jobs:
  check-changes:
    runs-on: ubuntu-22.04
    if: github.event_name == 'schedule'
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Check for commits in the past week
      id: check
      run: |
        if git log --since="7 days ago" --oneline | grep -q .; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi

  push-ubuntu:
    runs-on: ubuntu-22.04
    needs: [check-changes]
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.target == 'both' || inputs.target == 'ubuntu') ||
      github.event_name == 'schedule' && needs.check-changes.outputs.has_changes == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Ubuntu image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.ubuntu
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          luafan/luafan-ubuntu:latest
          luafan/luafan-ubuntu:${{ github.sha }}

  push-alpine:
    runs-on: ubuntu-22.04
    needs: [check-changes]
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.target == 'both' || inputs.target == 'alpine') ||
      github.event_name == 'schedule' && needs.check-changes.outputs.has_changes == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Alpine image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.alpine
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          luafan/luafan-alpine:latest
          luafan/luafan-alpine:${{ github.sha }}
